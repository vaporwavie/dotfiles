model = "gpt-5.5"
sandbox_mode = "danger-full-access"
network_access = true
web_search = "live"
service_tier = "fast"

[features]
unified_exec = true
shell_snapshot = true
multi_agent = true
prevent_idle_sleep = true
voice_transcription = true
js_repl = true

[notice]
hide_full_access_warning = true

[notice.model_migrations]
"gpt-5.2" = "gpt-5.2-codex"

[tui]
theme = "inspired-github"
status_line = ["current-dir", "git-branch", "model-with-reasoning", "context-remaining", "context-used", "used-tokens"]

[mcp_servers.paper]
enabled = true
url = "http://127.0.0.1:29979/mcp"

[plugins."github@openai-curated"]
enabled = true
